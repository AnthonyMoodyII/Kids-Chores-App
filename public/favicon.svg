<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Purple rounded square background -->
  <rect width="32" height="32" rx="7" fill="#7c3aed"/>

  <!-- Clipboard paper body -->
  <rect x="5" y="9" width="22" height="20" rx="2.5" fill="white"/>

  <!-- Clipboard top clip -->
  <rect x="11" y="7" width="10" height="5" rx="2.5" fill="#5b21b6"/>
  <rect x="13" y="8.5" width="6" height="2" rx="1" fill="#4c1d95"/>

  <!-- "M" header in violet at top of clipboard -->
  <text
    x="16" y="16"
    text-anchor="middle"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="6.5"
    font-weight="900"
    letter-spacing="-0.3"
    fill="#6d28d9"
  >M</text>

  <!-- Divider line under M -->
  <line x1="7" y1="17.5" x2="25" y2="17.5" stroke="#ede9fe" stroke-width="0.8"/>

  <!-- Row 1: amber checked checkbox -->
  <rect x="8" y="19" width="4" height="4" rx="1" fill="#f59e0b"/>
  <path d="M9 21l1.1 1.2 2-2.4" stroke="white" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Line -->
  <rect x="14" y="20.5" width="10" height="1.5" rx="0.75" fill="#ddd6fe"/>

  <!-- Row 2: amber checked checkbox -->
  <rect x="8" y="24" width="4" height="4" rx="1" fill="#f59e0b"/>
  <path d="M9 26l1.1 1.2 2-2.4" stroke="white" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Line (shorter = variety) -->
  <rect x="14" y="25.5" width="7.5" height="1.5" rx="0.75" fill="#ddd6fe"/>
</svg>
