version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: chorehero_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: chorehero
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chore-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: moodyplex/chores-app-backend:latest
    container_name: chorehero_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://admin:password123@db:5432/chorehero"
      PORT: 3000
    depends_on:
      - db
    networks:
      - chore-network

  frontend:
    build: .
    image: moodyplex/chores-app-frontend:latest
    container_name: chorehero_ui
    ports:
      - "8080:80"
    environment:
      VITE_API_URL: "http://localhost:3000"
    depends_on:
      - backend
    networks:
      - chore-network

networks:
  chore-network:
    driver: bridge

volumes:
  postgres_data: