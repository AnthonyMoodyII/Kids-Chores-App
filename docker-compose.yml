version: '3.8'

services:
  db:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: moodyplex/moody-chors-postgres:latest
    container_name: chorehero_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: chorehero
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chore-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: moodyplex/chores-app-backend:latest
    container_name: chorehero_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://admin:password123@db:5432/chorehero"
      PORT: 3000
      PARENT_RESET_CODE: "moody-reset-2026"
      APP_URL: ""   # e.g. https://chores.yourdomain.com — leave empty for auto-detect
    depends_on:
      - db
    networks:
      - chore-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    image: moodyplex/chores-app-frontend:latest
    container_name: chorehero_ui
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - chore-network

networks:
  chore-network:
    driver: bridge

volumes:
  postgres_data: