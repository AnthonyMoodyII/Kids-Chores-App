services:
  db:
    image: moodyplex/moody-chores-postgres:latest
    container_name: chorehero_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: chorehero
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chore-network

  backend:
    image: moodyplex/chores-app-backend:latest
    container_name: chorehero_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://admin:password123@db:5432/chorehero"
      PORT: 3000
      PARENT_RESET_CODE: "moody-reset-2026"
      APP_URL: "https://chores.moodyplex.com"
    depends_on:
      - db
    networks:
      - chore-network

  frontend:
    image: moodyplex/chores-app-frontend:latest
    container_name: chorehero_ui
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - chore-network

  watchtower:
    image: containrrr/watchtower
    container_name: chorehero_watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 chorehero_api chorehero_ui chorehero_db
    networks:
      - chore-network

networks:
  chore-network:
    driver: bridge

volumes:
  postgres_data:
